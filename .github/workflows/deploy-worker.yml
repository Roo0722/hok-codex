name: Deploy Worker (standalone)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worker/**'

permissions:
  contents: write

jobs:
  deploy-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      - name: Update Worker AI_API_KEY secret
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "${{ secrets.AI_API_KEY }}" | npx wrangler secret put AI_API_KEY

      - name: Update Worker ADMIN_PASSWORD secret
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: printf '%s' "${{ secrets.ADMIN_PASSWORD }}" | npx wrangler secret put ADMIN_PASSWORD

      - name: Deploy Worker and capture output
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy > deploy-output.txt 2>&1 || true; cat deploy-output.txt

      - name: List Worker secrets and capture output
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler secret list > secret-list-output.txt 2>&1 || true; cat secret-list-output.txt

      - name: Test patches/check endpoint end-to-end
        run: |
          sleep 5
          curl -s -X POST https://hok-codex-worker.jnjnbnd.workers.dev/api/patches/check -w "\nHTTP_STATUS:%{http_code}\n" > worker/patch-check-test-output.txt 2>&1 || true
          cat worker/patch-check-test-output.txt

      - name: Test rankings/check endpoint end-to-end
        run: |
          curl -s -X POST "https://hok-codex-worker.jnjnbnd.workers.dev/api/rankings/check?force=true" -w "\nHTTP_STATUS:%{http_code}\n" > worker/rankings-check-test-output.txt 2>&1 || true
          cat worker/rankings-check-test-output.txt

      - name: Test admin analyze endpoint end-to-end
        working-directory: worker
        run: |
          curl -s -X POST "https://hok-codex-worker.jnjnbnd.workers.dev/api/admin/analyze" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Password: p@ssword!" \
            --data-binary @test-payload.json \
            -w "\nHTTP_STATUS:%{http_code}\n" > admin-test-output.txt 2>&1 || true
          cat admin-test-output.txt

      - name: Replace placeholder July 2 patch with real detailed data
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler d1 execute hok-codex-db --remote --file=./delete-old-july02.sql > delete-july02-output.txt 2>&1 || true
          curl -s -X POST "https://hok-codex-worker.jnjnbnd.workers.dev/api/admin/confirm" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Password: p@ssword!" \
            --data-binary @confirm-payload.json \
            -w "\nHTTP_STATUS:%{http_code}\n" > confirm-july02-output.txt 2>&1 || true
          cat delete-july02-output.txt
          cat confirm-july02-output.txt

      - name: Verify patches list reflects the change
        run: |
          curl -s "https://hok-codex-worker.jnjnbnd.workers.dev/api/patches" > worker/verify-patches-output.txt 2>&1 || true
          python3 -c "import json; data = json.load(open('worker/verify-patches-output.txt')); [print(json.dumps(p, indent=2)) for p in data if p.get('release_date') == '2026-07-02']"

      - name: Remove duplicate July 2 entries from repeated test runs
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute hok-codex-db --remote --file=./dedupe-july02.sql > dedupe-output.txt 2>&1 || true; cat dedupe-output.txt

      - name: Commit deploy output back to repo
        working-directory: worker
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add deploy-output.txt secret-list-output.txt patch-check-test-output.txt rankings-check-test-output.txt admin-test-output.txt delete-july02-output.txt confirm-july02-output.txt verify-patches-output.txt dedupe-output.txt
          git commit -m "Worker deploy output [skip ci]" || echo "Nothing to commit"
          git push
