name: One-time D1 Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-d1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      - name: Create D1 database and capture output
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler d1 create hok-codex-db > create-output.txt 2>&1 || true
          npx wrangler d1 list > list-output.txt 2>&1 || true
          cat create-output.txt
          cat list-output.txt

      - name: Initialize schema on remote D1
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute hok-codex-db --remote --file=./schema.sql > schema-output.txt 2>&1 || true

      - name: Seed remote D1 with real data
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute hok-codex-db --remote --file=./seed-data.sql > seed-output.txt 2>&1 || true

      - name: Seed July 2 patch into remote D1
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute hok-codex-db --remote --file=./seed-july02.sql > seed-july02-output.txt 2>&1 || true; cat seed-july02-output.txt

      - name: Commit results back to repo
        working-directory: worker
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add create-output.txt list-output.txt schema-output.txt seed-output.txt seed-july02-output.txt
          git commit -m "D1 setup output [skip ci]" || echo "Nothing to commit"
          git push
