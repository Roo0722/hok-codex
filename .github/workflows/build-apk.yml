name: Build Android APK and Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java (required by Gradle / Android SDK) ──────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Fix Android SDK environment variables ─────────────────────
      - name: Fix Android SDK paths
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      # ── 5. Gradle cache (speeds up repeat builds) ───────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-capacitor-6
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Install npm dependencies (includes Capacitor) ────────────
      - name: Install npm dependencies
        run: npm install

      # ── 7. Build Next.js static export → out/ ───────────────────────
      - name: Build Next.js static site
        run: npm run build

      # ── 8. Add Capacitor Android platform (generates android/ project) ──
      - name: Add Capacitor Android platform
        run: ./node_modules/.bin/cap add android

      # ── 9. Sync web assets into the Android project ─────────────────
      - name: Sync Capacitor
        run: ./node_modules/.bin/cap sync android

      # ── 10. Make Gradle wrapper executable ──────────────────────────
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # ── 11. Build the debug APK ──────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 12. Upload APK as downloadable artifact ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoK-Codex-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  deploy-worker:
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install worker dependencies ───────────────────────────────
      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      # ── 4. Deploy to Cloudflare Workers ──────────────────────────────
      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
